# otel-collector-config.example.yaml
#
# TEMPLATE tanpa secret. Salin jadi `otel-collector-config.yaml`
# (file asli di-ignore git) lalu isi credential & endpoint asli.
#
# Collector menerima span dari:
#   1. Aplikasi Go consumer  (OTLP HTTP port 4318 / gRPC 4317)
#   2. Solace broker         (Solace receiver port 5674)
# lalu forward ke tracing backend (contoh: Grafana Tempo).

receivers:
  # ── Span dari aplikasi Go (OTLP) ────────────────────────────────────────
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

  # ── Span dari Solace broker (via AMQP queue #telemetry-trace) ───────────
  solace:
    broker: [host.docker.internal:5674]   # ganti dengan host broker
    auth:
      sasl_plain:
        username: ${SOLACE_TRACE_USERNAME} # JANGAN hardcode — pakai env/secret
        password: ${SOLACE_TRACE_PASSWORD}
    queue: queue://#telemetry-trace
    tls:
      insecure: true                       # set false + konfig TLS di production

exporters:
  # ── Export ke tracing backend (contoh Grafana Tempo) ────────────────────
  otlp/tempo:
    endpoint: "<TEMPO_ENDPOINT>:443"
    headers:
      authorization: "Basic <YOUR_BASE64_TOKEN>"   # JANGAN commit token asli

  debug:
    verbosity: detailed

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

service:
  telemetry:
    logs:
      level: "debug"

  pipelines:
    traces/solace:
      receivers: [solace]
      processors: [batch]
      exporters: [otlp/tempo]

    traces/app:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, debug]
